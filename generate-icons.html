<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Riley Family — Generate Icons</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; gap: 20px; background: #f2f2f7; }
    h1 { font-size: 22px; font-weight: 700; }
    p { color: #666; font-size: 15px; text-align: center; max-width: 480px; }
    canvas { border-radius: 22%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 12px 22px; border-radius: 12px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 700; background: #007AFF; color: white;
    }
    button:hover { background: #005FCC; }
    .note { font-size: 13px; color: #999; }
  </style>
</head>
<body>
  <h1>Riley Family Icon Generator</h1>
  <p>Click each button to download the icon at the right size. Save all three files into the <strong>icons/</strong> folder, then push to GitHub.</p>

  <canvas id="c" width="512" height="512"></canvas>

  <div class="buttons">
    <button onclick="download(180, 'apple-touch-icon.png')">Download apple-touch-icon.png (180×180)</button>
    <button onclick="download(192, 'icon-192.png')">Download icon-192.png (192×192)</button>
    <button onclick="download(512, 'icon-512.png')">Download icon-512.png (512×512)</button>
  </div>

  <p class="note">After downloading, place all three files in the <code>icons/</code> folder next to this file.</p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const S = 512;

    function draw(size) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const g = c.getContext('2d');
      const r = size / 512; // scale ratio

      // Background gradient
      const grad = g.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#007AFF');
      grad.addColorStop(1, '#5856D6');
      g.fillStyle = grad;

      // Rounded rect background
      const radius = size * 0.22;
      g.beginPath();
      g.moveTo(radius, 0);
      g.lineTo(size - radius, 0);
      g.quadraticCurveTo(size, 0, size, radius);
      g.lineTo(size, size - radius);
      g.quadraticCurveTo(size, size, size - radius, size);
      g.lineTo(radius, size);
      g.quadraticCurveTo(0, size, 0, size - radius);
      g.lineTo(0, radius);
      g.quadraticCurveTo(0, 0, radius, 0);
      g.closePath();
      g.fill();

      // Shine overlay
      const shine = g.createLinearGradient(0, 0, 0, size * 0.5);
      shine.addColorStop(0, 'rgba(255,255,255,0.25)');
      shine.addColorStop(1, 'rgba(255,255,255,0)');
      g.fillStyle = shine;
      g.fill();

      // Re-draw background for house drawing
      g.save();
      g.globalCompositeOperation = 'destination-atop';
      g.fillStyle = 'rgba(0,0,0,0)';
      g.fillRect(0, 0, size, size);
      g.restore();

      // House body
      g.fillStyle = 'rgba(255,255,255,0.95)';

      // Roof (triangle)
      g.beginPath();
      g.moveTo(size * 0.5,  size * 0.18);
      g.lineTo(size * 0.77, size * 0.42);
      g.lineTo(size * 0.23, size * 0.42);
      g.closePath();
      g.fill();

      // Chimney
      g.fillRect(size * 0.62, size * 0.18, size * 0.08, size * 0.14);

      // House walls
      g.beginPath();
      g.roundRect(size * 0.23, size * 0.42, size * 0.54, size * 0.38, size * 0.02);
      g.fill();

      // Door (cut out of house with gradient)
      const doorGrad = g.createLinearGradient(0, 0, size, size);
      doorGrad.addColorStop(0, '#007AFF');
      doorGrad.addColorStop(1, '#5856D6');
      g.fillStyle = doorGrad;
      g.beginPath();
      g.roundRect(size * 0.43, size * 0.57, size * 0.14, size * 0.23, size * 0.02);
      g.fill();

      // Left window
      g.beginPath();
      g.roundRect(size * 0.27, size * 0.48, size * 0.13, size * 0.13, size * 0.015);
      g.fill();

      // Right window
      g.beginPath();
      g.roundRect(size * 0.60, size * 0.48, size * 0.13, size * 0.13, size * 0.015);
      g.fill();

      // Heart (bottom right accent)
      g.fillStyle = 'rgba(255,255,255,0.88)';
      const hx = size * 0.73, hy = size * 0.3, hs = size * 0.055;
      g.beginPath();
      g.moveTo(hx, hy + hs * 0.4);
      g.bezierCurveTo(hx, hy, hx - hs, hy - hs * 0.6, hx - hs * 1.1, hy);
      g.bezierCurveTo(hx - hs * 1.8, hy + hs * 0.5, hx, hy + hs * 1.6, hx, hy + hs * 1.6);
      g.bezierCurveTo(hx, hy + hs * 1.6, hx + hs * 1.8, hy + hs * 0.5, hx + hs * 1.1, hy);
      g.bezierCurveTo(hx + hs, hy - hs * 0.6, hx, hy, hx, hy + hs * 0.4);
      g.fill();

      return c;
    }

    // Preview on page
    const preview = draw(512);
    canvas.getContext('2d').drawImage(preview, 0, 0);

    function download(size, filename) {
      const c = draw(size);
      const a = document.createElement('a');
      a.href = c.toDataURL('image/png');
      a.download = filename;
      a.click();
    }
  </script>
</body>
</html>
