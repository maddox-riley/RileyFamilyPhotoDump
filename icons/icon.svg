<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF"/>
      <stop offset="100%" style="stop-color:#5856D6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="256" rx="0" fill="url(#shine)"/>
  <rect width="512" height="112" rx="112" fill="url(#shine)"/>

  <!-- House icon -->
  <g transform="translate(256,256)" fill="white">
    <!-- Roof -->
    <polygon points="0,-130 130,-20 -130,-20" opacity="0.95"/>
    <!-- Chimney -->
    <rect x="60" y="-130" width="28" height="50" rx="4" opacity="0.95"/>
    <!-- House body -->
    <rect x="-100" y="-20" width="200" height="150" rx="8" opacity="0.95"/>
    <!-- Door -->
    <rect x="-25" y="40" width="50" height="90" rx="8" fill="url(#bg)"/>
    <!-- Windows -->
    <rect x="-80" y="10" width="45" height="45" rx="6" fill="url(#bg)"/>
    <rect x="35" y="10" width="45" height="45" rx="6" fill="url(#bg)"/>
  </g>

  <!-- Heart accent -->
  <g transform="translate(360,160)" fill="white" opacity="0.9">
    <path d="M0,8 C0,3 -5,-4 -12,-4 C-19,-4 -22,3 -22,8 C-22,20 0,30 0,30 C0,30 22,20 22,8 C22,3 19,-4 12,-4 C5,-4 0,3 0,8 Z" transform="scale(0.8)"/>
  </g>
</svg>
